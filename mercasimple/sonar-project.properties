# ── Identidad del proyecto en SonarCloud ─────────────────────────────────────
sonar.projectKey=fabian-sanabria_devOps-microservicios
sonar.organization=fabian-sanabria

# ── Código a analizar ────────────────────────────────────────────────────────
# Analiza solo el código fuente de los servicios (no el gateway Nginx ni configs).
sonar.sources=auth-service/src,catalog-service/src,orders-service/src,payments-service/src
sonar.sourceEncoding=UTF-8

# Los .spec.ts son pruebas: se registran como tests, no como código fuente.
sonar.tests=auth-service/src,catalog-service/src,orders-service/src,payments-service/src
sonar.test.inclusions=**/*.spec.ts

# Excluir del análisis lo que no es código fuente propio.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts

# ── Cobertura ────────────────────────────────────────────────────────────────
# Reportes lcov que genera Jest (jest --coverage) en cada servicio.
# El job "sonarcloud" del CI reescribe las rutas internas de estos archivos para
# que apunten a <servicio>/src/... (relativas a la raíz del monorepo).
sonar.javascript.lcov.reportPaths=auth-service/coverage/lcov.info,catalog-service/coverage/lcov.info,orders-service/coverage/lcov.info,payments-service/coverage/lcov.info

# Archivos que Jest NO instrumenta (ver collectCoverageFrom en cada package.json):
# excluirlos de la cobertura evita que arrastren el % hacia abajo artificialmente.
sonar.coverage.exclusions=**/*.spec.ts,**/*.module.ts,**/main.ts,**/*.dto.ts,**/*.entity.ts

# ── Quality Gate ─────────────────────────────────────────────────────────────
# El scan espera el veredicto del quality gate y falla el job si no pasa.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
