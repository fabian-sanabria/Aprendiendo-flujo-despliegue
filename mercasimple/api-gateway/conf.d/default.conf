upstream auth_service {
    server auth-service:3001;
    keepalive 32;
}

upstream catalog_service {
    server catalog-service:3002;
    keepalive 32;
}

upstream orders_service {
    server orders-service:3003;
    keepalive 32;
}

upstream payments_service {
    server payments-service:3004;
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

server {
    listen 8080;
    server_name _;

    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check (gateway itself)
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # ── Auth service ──────────────────────────────────────────────────────────
    location /auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://auth_service/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location /users/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://auth_service/users/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Catalog service ───────────────────────────────────────────────────────
    location /products/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass         http://catalog_service/products/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Orders service ────────────────────────────────────────────────────────
    location /cart/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://orders_service/cart/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location /orders/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://orders_service/orders/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization     $http_authorization;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── 404 fallback ──────────────────────────────────────────────────────────
    location / {
        return 404 '{"statusCode":404,"message":"Route not found"}';
        add_header Content-Type application/json;
    }
}
